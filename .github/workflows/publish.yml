name: Build and Publish

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [upstream-published]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout casehub-pages (sibling)
        uses: actions/checkout@v4
        with:
          repository: casehubio/casehub-pages
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          path: ../pages

      - name: Build pages packages
        working-directory: ../pages
        run: |
          corepack enable
          yarn install --immutable
          yarn build

      - name: Checkout blocks-ui (sibling)
        uses: actions/checkout@v4
        with:
          repository: casehubio/blocks-ui
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          path: ../blocks-ui

      - name: Build blocks-ui packages
        working-directory: ../blocks-ui
        run: |
          corepack enable
          yarn install --immutable
          yarn build

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          cache: 'maven'

      - name: Build and test
        run: mvn --batch-mode verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/*
            **/target/failsafe-reports/*
          if-no-files-found: ignore
          retention-days: 5

      - name: Publish to GitHub Packages
        if: github.event_name != 'pull_request'
        run: mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
