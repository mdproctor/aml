quarkus.http.test-port=0

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:aml-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=

quarkus.hibernate-orm.packages=io.casehub.work.runtime.model,io.casehub.work.runtime.filter,io.casehub.aml.domain
# AML has no migrations yet — Hibernate generates the default schema in tests.
# Flyway is disabled: casehubio/qhorus#180 — qhorus V1003 conflicts with ledger V1003
# when both db/qhorus/migration and db/ledger/migration are scanned together.
# Re-enable when qhorus#180 renames V1003 to V1004.
# Note: Hibernate-generated schema diverges from the Flyway-managed production schema.
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.flyway.migrate-at-start=false

quarkus.hibernate-orm.qhorus.datasource=qhorus
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.ledger.model
# Same blocker as above — also disabled on qhorus datasource.
# Schema is Hibernate-generated — diverges from the Flyway-managed production schema.
quarkus.hibernate-orm.qhorus.database.generation=drop-and-create
quarkus.flyway.qhorus.migrate-at-start=false

casehub.ledger.datasource=qhorus
quarkus.arc.selected-alternatives=io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository
quarkus.scheduler.enabled=false
quarkus.jackson.write-dates-as-timestamps=false
