quarkus.http.test-port=0

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:aml-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=

quarkus.hibernate-orm.packages=io.casehub.work.runtime.model,io.casehub.work.runtime.filter,io.casehub.aml.domain
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/work/migration

quarkus.hibernate-orm.qhorus.datasource=qhorus
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.ledger.model,io.casehub.aml.ledger,io.casehub.aml.trust
quarkus.hibernate-orm.qhorus.database.generation=none
quarkus.flyway.qhorus.migrate-at-start=true
# casehub.ledger.datasource=qhorus means the qhorus PU manages ledger entities,
# so qhorus Flyway must include ledger migrations alongside qhorus migrations.
# Overrides the extension default (db/qhorus/migration only).
quarkus.flyway.qhorus.locations=classpath:db/qhorus/migration,classpath:db/ledger/migration,classpath:db/aml-ledger/migration,classpath:db/aml-engine-ledger/migration,classpath:db/aml-trust-routing/migration

casehub.ledger.datasource=qhorus
quarkus.arc.selected-alternatives=io.casehub.ledger.runtime.repository.jpa.JpaLedgerEntryRepository,io.casehub.ledger.runtime.repository.jpa.JpaLedgerMerkleFrontierRepository
casehub.ledger.identity.tokenisation.enabled=true
quarkus.jackson.write-dates-as-timestamps=false

# ── Quartz — RAM store, forced start (GE-20260523-4ca5e7) ─────────────────────
# casehub-engine-scheduler-quartz brings in quarkus-quartz. Quartz requires 6-field
# cron expressions; casehub-work @Scheduled beans use 5-field Unix cron. Forced start
# + RAM store lets Quartz initialize without JDBC tables.
quarkus.scheduler.start-mode=forced
quarkus.quartz.store-type=ram

# ── Bean exclusions ────────────────────────────────────────────────────────────
# GE-20260523-4ca5e7: exclude casehub-work scheduler beans (5-field Unix cron,
# incompatible with Quartz). Scheduler-only — WorkItem SLA enforcement is unaffected.
quarkus.arc.exclude-types=\
  io.casehub.work.runtime.service.ExpiryLifecycleService,\
  io.casehub.work.runtime.service.ExpiryCleanupJob,\
  io.casehub.work.runtime.service.ClaimDeadlineJob,\
  io.casehub.work.runtime.strategy.RoutingCursorCleanupJob,\
  io.casehub.persistence.memory.DefaultTestPrincipal,\
  io.casehub.work.runtime.service.NoOpGroupMembershipProvider

# ── Jandex: force CDI scanning for modules without embedded index ──────────────
# casehub-platform contains MockPreferenceProvider (CDI bean)
quarkus.index-dependency.casehub-platform.group-id=io.casehub
quarkus.index-dependency.casehub-platform.artifact-id=casehub-platform
# casehub-engine modules lack embedded Jandex indices (GE-20260523-86ed13)
quarkus.index-dependency.engine-common.group-id=io.casehub
quarkus.index-dependency.engine-common.artifact-id=casehub-engine-common
quarkus.index-dependency.engine-scheduler-quartz.group-id=io.casehub
quarkus.index-dependency.engine-scheduler-quartz.artifact-id=casehub-engine-scheduler-quartz
quarkus.index-dependency.engine-persistence-memory.group-id=io.casehub
quarkus.index-dependency.engine-persistence-memory.artifact-id=casehub-engine-persistence-memory
# engine-testing provides @Priority(1) auto-selected in-memory impls of all engine SPIs:
# TestCaseMetaModelRepository, TestCaseInstanceRepository, TestEventLogRepository
quarkus.index-dependency.engine-testing.group-id=io.casehub
quarkus.index-dependency.engine-testing.artifact-id=casehub-engine-testing
# Layer 6: trust-weighted routing activates TrustWeightedAgentStrategy and WorkerDecisionEventCapture
quarkus.index-dependency.engine-ledger.group-id=io.casehub
quarkus.index-dependency.engine-ledger.artifact-id=casehub-engine-ledger
