quarkus.application.name=casehub-aml

# ── Frontend (Quinoa) ────────────────────────────────────────────────────
quarkus.quinoa.build-dir=dist
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=26.0.0

casehub.platform.config.files=classpath:casehub/aml/trust-routing.yaml

# ── Simulation API (build-time gating) ─────────────────────────────────────
# Only available in dev mode. Production builds have simulation endpoints removed.
%dev.casehub.aml.simulation.enabled=true

# ============================================================
# Default datasource — AML domain + WorkItem tables
# ============================================================

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:aml;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Assign work entities + future AML entities to the default PU.
# Note: casehub-work entities are in io.casehub.work.runtime.model;
# AML entities will be added to io.casehub.aml.domain as they are introduced per tutorial layer.
quarkus.hibernate-orm.packages=io.casehub.work.runtime.model,io.casehub.work.runtime.filter,io.casehub.aml.domain,io.casehub.aml.query,io.casehub.platform.memory.jpa
quarkus.hibernate-orm.database.generation=none
# engine-work-adapter is an explicit compile dep (not transitive); MemoryPlanItemStore displaces JpaPlanItemStore
# so WorkAdapterPlanItemEntity is not required in the JPA context (no Flyway for it).
quarkus.arc.selected-alternatives=io.casehub.persistence.memory.MemoryPlanItemStore,io.casehub.persistence.memory.MemoryReactivePlanItemStore,io.casehub.persistence.memory.InMemoryEventLogRepository,io.casehub.persistence.memory.InMemoryReactiveEventLogRepository,io.casehub.persistence.memory.InMemoryCaseMetaModelRepository,io.casehub.persistence.memory.InMemoryReactiveCaseMetaModelRepository,io.casehub.persistence.memory.InMemoryCaseInstanceRepository,io.casehub.persistence.memory.InMemoryReactiveCaseInstanceRepository,io.casehub.persistence.memory.InMemorySubCaseGroupRepository,io.casehub.persistence.memory.InMemoryReactiveSubCaseGroupRepository
# Tutorial harness CDI exclusions: in-memory engine alternatives displace JPA impls at runtime;
# DefaultTestPrincipal and NoOpGroupMembershipProvider compete with platform mocks.
# TenantScopedPrincipal: casehub-work SNAPSHOT added this @RequestScoped CurrentPrincipal bean.
# AML uses QhorusInboundCurrentPrincipal for tenant context (Qhorus-based architecture).
# TenantScopedPrincipal conflicts as a second non-@DefaultBean CurrentPrincipal — ambiguous with
# QhorusInboundCurrentPrincipal. Excluded here because AML's CDI wiring is Qhorus-first.
quarkus.arc.exclude-types=io.casehub.persistence.memory.DefaultTestPrincipal,\
  io.casehub.work.runtime.service.NoOpGroupMembershipProvider,\
  io.casehub.work.runtime.service.TenantScopedPrincipal
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/work/migration,classpath:db/memory/migration,classpath:db/aml-query/migration

# ============================================================
# Qhorus named datasource — qhorus + ledger tables
# Per platform convention: qhorus always on its own named datasource.
# Ledger shares this PU (casehub.ledger.datasource=qhorus below).
# ============================================================

quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:qhorus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=

quarkus.hibernate-orm.qhorus.datasource=qhorus
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime.model,io.casehub.ledger.model,io.casehub.aml.ledger,io.casehub.aml.trust
quarkus.hibernate-orm.qhorus.database.generation=none
quarkus.flyway.qhorus.migrate-at-start=true
# casehub.ledger.datasource=qhorus means ledger entities live on this PU,
# so qhorus Flyway must include ledger migrations. Overrides extension default.
quarkus.flyway.qhorus.locations=classpath:db/qhorus/migration,classpath:db/ledger/migration,classpath:db/aml-ledger/migration,classpath:db/aml-engine-ledger/migration,classpath:db/aml-trust-routing/migration

# Direct casehub-ledger to the qhorus persistence unit
casehub.ledger.datasource=qhorus
casehub.ledger.erasure-receipt.enabled=true

# ============================================================
# Logging
# ============================================================
quarkus.log.level=INFO
quarkus.log.category."io.casehub".level=DEBUG

# ============================================================
# Production overrides — supply via environment variables:
#   QUARKUS_DATASOURCE_JDBC_URL / USERNAME / PASSWORD
#   QUARKUS_DATASOURCE_QHORUS_JDBC_URL / USERNAME / PASSWORD
# ============================================================
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.qhorus.db-kind=postgresql

# casehub-engine modules lack embedded Jandex indices — force scanning at augmentation.
%prod.quarkus.index-dependency.casehub-engine.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine.artifact-id=casehub-engine
%prod.quarkus.index-dependency.casehub-engine-common.group-id=io.casehub
%prod.quarkus.index-dependency.casehub-engine-common.artifact-id=casehub-engine-common
%prod.quarkus.index-dependency.engine-work-adapter.group-id=io.casehub
%prod.quarkus.index-dependency.engine-work-adapter.artifact-id=casehub-engine-work-adapter
%prod.quarkus.index-dependency.engine-blackboard.group-id=io.casehub
%prod.quarkus.index-dependency.engine-blackboard.artifact-id=casehub-engine-blackboard
