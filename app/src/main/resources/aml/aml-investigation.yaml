dsl: "0.1"
version: "1.0.0"
name: aml-investigation
namespace: casehub-aml
title: AML Investigation — adaptive specialist coordination

spec:

  ## ─── Capabilities ───────────────────────────────────────────────────────────
  capabilities:
    - name: entity-resolution
      description: "Resolve beneficial ownership chain from flagged transaction"
      inputProjection: "{ transaction: .transaction }"
      outputProjection: "{ entityResolution: . }"

    - name: pattern-analysis
      description: "Detect layering, structuring, smurfing patterns"
      inputProjection: "{ transaction: .transaction, entityGraph: .entityResolution.ownershipChain }"
      outputProjection: "{ patternAnalysis: . }"

    - name: osint-screening
      description: "Sanctions lists, PEP databases, adverse media screening"
      inputProjection: "{ transaction: .transaction }"
      outputProjection: "{ osintScreening: . }"

    - name: senior-analyst-review
      description: "Senior analyst investigation for PEP entities and high-risk cases"
      inputProjection: "{ transaction: .transaction, entityResolution: .entityResolution }"
      outputProjection: "{ seniorAnalystReview: . }"

    - name: sar-drafting
      description: "Synthesise specialist findings into SAR narrative"
      inputProjection: "{ transaction: .transaction, entityResolution: .entityResolution, patternAnalysis: .patternAnalysis, osintScreening: .osintScreening }"
      outputProjection: "{ sarNarrative: .sarNarrative }"

    - name: investigation-triage
      description: "Evaluate specialist findings and decide whether SAR is warranted"
      inputProjection: "{ entityResolution: .entityResolution, patternAnalysis: .patternAnalysis, osintScreening: .osintScreening, cbrPathAdvice: .cbrPathAdvice }"
      outputProjection: "{ investigationTriage: . }"

    - name: compliance-review-opening
      description: "Open compliance officer review WorkItem after MLRO gate approval"
      inputProjection: "{ transaction: .transaction, entityResolution: .entityResolution, patternAnalysis: .patternAnalysis, osintScreening: .osintScreening, sarNarrative: .sarNarrative }"
      outputProjection: "{ complianceTaskId: .complianceTaskId }"

  ## ─── Goals ──────────────────────────────────────────────────────────────────
  goals:
    - name: investigation-complete
      kind: success
      condition: ".complianceTaskId != null"
    - name: investigation-cleared
      kind: success
      condition: '.investigationTriage.decision == "FALSE_POSITIVE" or .investigationTriage.decision == "INCONCLUSIVE"'

  ## ─── Completion ─────────────────────────────────────────────────────────────
  completion:
    success:
      anyOf:
        - investigation-complete
        - investigation-cleared

  ## ─── Bindings ────────────────────────────────────────────────────────────────
  bindings:

    ## Fires first — entity resolution has no prior-context prerequisite
    - name: entity-resolution
      on: { contextChange: {} }
      when: ".transaction != null and .entityResolution == null"
      capability: entity-resolution

    ## Fires after entity resolution; runs in parallel with osint-screening
    - name: pattern-analysis
      on: { contextChange: {} }
      when: ".entityResolution != null and .patternAnalysis == null"
      capability: pattern-analysis

    ## Fires after entity resolution; runs in parallel with pattern-analysis
    ## OSINT always declines in Layer 5 stubs — osintScreening.declined=true is
    ## written as a completed result so sar-drafting condition is satisfied
    - name: osint-screening
      on: { contextChange: {} }
      when: ".entityResolution != null and .osintScreening == null"
      capability: osint-screening

    ## Fires at case start when entity has established high-risk history in CaseMemoryStore,
    ## BEFORE entity resolution runs (entityResolution == null ensures exactly-once dispatch:
    ## once entity-resolution writes its result, this condition becomes permanently false).
    - name: senior-analyst-required-prior-context
      on: { contextChange: {} }
      when: >-
        .priorEntityContext.knownHighRisk == true and
        .entityResolution == null and
        .seniorAnalystReview == null
      capability: senior-analyst-review

    ## Fires after entity resolution for first-time encounters: PEP entity type or risk score > 0.8.
    ## Suppressed if prior-context routing already dispatched (priorEntityContext.knownHighRisk != true)
    ## to prevent double dispatch and the Merkle frontier constraint violation it causes.
    - name: senior-analyst-required-resolution
      on: { contextChange: {} }
      when: >-
        .entityResolution != null and
        .priorEntityContext.knownHighRisk != true and
        (.entityResolution.entityType == "PEP" or .entityResolution.riskScore > 0.8) and
        .seniorAnalystReview == null
      capability: senior-analyst-review

    ## Fires once all specialist findings are present.
    ## CBR-gating (.cbrPathAdvice) is added in Task 4 when the advisor exists.
    - name: investigation-triage
      on: { contextChange: {} }
      when: >-
        .entityResolution != null and
        .patternAnalysis != null and
        .osintScreening != null and
        .investigationTriage == null
      capability: investigation-triage

    ## Fires when triage decides SAR is warranted.
    ## SAR-drafting worker synthesises the narrative and declares PlannedAction(SAR_FILING);
    ## complianceTaskId is set by compliance-review-opening after MLRO gate approval.
    - name: sar-drafting
      on: { contextChange: {} }
      when: >-
        .entityResolution != null and
        .patternAnalysis != null and
        .osintScreening != null and
        .investigationTriage.decision == "SAR_WARRANTED" and
        .sarNarrative == null
      capability: sar-drafting

    ## Fires after MLRO gate approves SAR filing. The compliance-review-opening worker
    ## creates the compliance officer WorkItem (30-day FinCEN SLA) and writes complianceTaskId.
    - name: compliance-review-opening
      on: { contextChange: {} }
      when: ".sarNarrative != null and .complianceTaskId == null"
      capability: compliance-review-opening
